name: Deploy SwiftField to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Start deploy notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚀 Iniciando deploy SwiftField
            Branch: master
            Autor: ${{ github.actor }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/html/SwiftField

            echo "Reset y pull del repo..."
            git reset --hard
            git pull origin master

            echo "Composer install..."
            composer install --no-interaction --optimize-autoloader

            if [ -f package.json ]; then
              echo "NPM install y build..."
              npm ci
              npm run build
            fi

            echo "Migraciones y cache Laravel..."
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            chmod -R 775 storage bootstrap/cache
            chown -R www-data:www-data storage bootstrap/cache
            echo "Deploy completado."

      - name: Deploy finished notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ Deploy SwiftField completado
            Estado: ${{ job.status }}
