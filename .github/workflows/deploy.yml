name: Deploy SwiftField to VPS

on:
push:
branches:
- main

jobs:
deploy:
name: Deploy SwiftField
runs-on: ubuntu-latest


steps:
  - name: Checkout repository
    uses: actions/checkout@v3

  - name: Start deploy notification
    uses: appleboy/telegram-action@master
    with:
      to: ${{ secrets.TELEGRAM_CHAT_ID }}
      token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      message: |
        🚀 DEPLOY INICIADO
        Proyecto: SwiftField
        Branch: main
        Commit: ${{ github.sha }}
        Autor: ${{ github.actor }}

  - name: Deploy via SSH
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.VPS_HOST }}
      username: ${{ secrets.VPS_USER }}
      key: ${{ secrets.VPS_SSH_KEY }}
      port: 22
      script: |
        set -e
        cd /var/www/html/SwiftField

        START=$(date +%s)

        git config --global --add safe.directory /var/www/html/SwiftField

        echo "Actualizando repositorio..."
        git reset --hard
        git pull origin main

        echo "Instalando dependencias Composer..."
        composer install --no-interaction --optimize-autoloader

        if [ -f package.json ]; then
          echo "Instalando dependencias NPM..."
          npm ci
          npm run build
        fi

        echo "Limpiando caches Laravel..."
        php artisan optimize:clear

        echo "Ejecutando migraciones..."
        php artisan migrate --force

        echo "Cacheando configuraciones..."
        php artisan config:cache
        php artisan route:cache
        php artisan view:cache

        echo "Reiniciando workers..."
        php artisan queue:restart
        sudo supervisorctl restart swift-field-worker:*

        echo "Ajustando permisos..."
        chmod -R 775 storage bootstrap/cache
        chown -R www-data:www-data storage bootstrap/cache

        END=$(date +%s)
        DURATION=$((END-START))
        echo "Deploy completado en $DURATION segundos."

  - name: Deploy finished notification
    if: always()
    uses: appleboy/telegram-action@master
    with:
      to: ${{ secrets.TELEGRAM_CHAT_ID }}
      token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      message: |
        ✅ DEPLOY FINALIZADO
        Proyecto: SwiftField
        Branch: main
        Commit: ${{ github.sha }}
        Autor: ${{ github.actor }}
        Estado: ${{ job.status }}
